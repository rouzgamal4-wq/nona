<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور ❤️ حب عمري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2d1b4e 0%, #1a1a2e 50%, #0d0d1a 100%);
            font-family: 'Poppins', 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        /* Music Player */
        .music-player {
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .music-player:hover {
            background: rgba(255,107,107,0.8);
            transform: scale(1.05);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px 50px;
            position: relative;
        }

        .hero h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .hero p {
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            margin-top: 15px;
        }

        /* Cards Grid - Modern Design */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            border-color: rgba(255,107,107,0.5);
        }

        .card-front, .card-back {
            padding: 40px 25px;
            text-align: center;
            transition: all 0.6s;
        }

        .card-front {
            background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(254,202,87,0.1));
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-front h3 {
            font-size: 28px;
            color: white;
            margin-top: 20px;
        }

        .card-front .flip-icon {
            font-size: 60px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-back {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,240,245,0.95));
            min-height: 400px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card.flipped .card-front {
            display: none;
        }

        .card.flipped .card-back {
            display: flex;
        }

        .card-back img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card-back .love-text {
            font-size: 18px;
            color: #ff6b6b;
            font-weight: bold;
            line-height: 1.6;
            text-align: center;
            padding: 15px;
        }

        /* Surprise Button */
        .surprise-section {
            text-align: center;
            padding: 50px;
        }

        .surprise-btn {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border: none;
            padding: 20px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 80px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .surprise-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 45px rgba(255,107,107,0.5);
        }

        /* Couple Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            text-align: center;
            animation: zoomIn 0.5s ease;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .modal-message {
            font-size: 36px;
            color: #ff6b6b;
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: bold;
        }

        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 50px;
            color: white;
            cursor: pointer;
            background: rgba(255,107,107,0.5);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-modal:hover {
            background: #ff6b6b;
            transform: rotate(90deg);
        }

        /* Floating Hearts Background */
        .floating-hearts {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-particle {
            position: absolute;
            font-size: 20px;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .cards-grid {
                padding: 20px;
                gap: 25px;
                grid-template-columns: 1fr;
            }
            .hero h1 {
                font-size: 2.5rem;
            }
            .surprise-btn {
                font-size: 20px;
                padding: 15px 35px;
            }
            .modal-message {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="music-player" id="musicBtn">
        🎵 عمرو دياب - تملي معاك 🎵
    </div>

    <div class="hero">
        <h1>نور ❤️ حبيبتي</h1>
        <p>كل يوم بحبك أكتر من اللي قبله | انتي أجمل حاجة في حياتي</p>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>

    <div class="surprise-section">
        <button class="surprise-btn" id="surpriseBtn">💖 لسه مخلصتش يا حب 💖</button>
    </div>

    <div class="modal" id="modal">
        <div class="close-modal" onclick="closeModal()">✕</div>
        <div class="modal-content">
            <img id="modalImage" alt="صورتنا">
            <div class="modal-message" id="modalMessage"></div>
        </div>
    </div>

    <div class="floating-hearts" id="floatingHearts"></div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://archive.org/download/amr-diab-tammaly-maak/Amr%20Diab%20-%20Tamally%20Maak.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Check login
        if (!localStorage.getItem('loveAccess')) {
            window.location.href = 'index.html';
        }

        // Images array with your paths
        const images = [
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.26 PM.jpeg", message: "نور... انتي القمر اللي منور حياتي كلها ❤️" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.27 PM.jpeg", message: "ضحكتك دي سبب سعادتي يا حبيبتي 💕" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.29 PM.jpeg", message: "عيونك البحر اللي باغرق فيه كل يوم 💖" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.30 PM.jpeg", message: "جنبك بحس اني في أحلام اليقظة 💗" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.30 PM (1).jpeg", message: "حبنا قصة هتحكيها الأجيال 💓" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.30 PM (2).jpeg", message: "خطيبتي... حبيبتي... ملكة قلبي 👑" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.30 PM (3).jpeg", message: "كل ثانية معاكي بعيشها عمر كامل 💘" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.31 PM.jpeg", message: "نور... اسم على مسمى... انتي نور عيني 🤍" },
            { src: "images/WhatsApp Image 2026-04-18 at 10.52.31 PM (1).jpeg", message: "بحبك حب ما شافته عين ولا سمعت بيه أذن 💝" }
        ];

        // Create cards dynamically
        const cardsGrid = document.getElementById('cardsGrid');
        
        images.forEach((img, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-front">
                    <div class="flip-icon">💌</div>
                    <h3>اقلبي الكارت ${index === 0 ? 'الأول' : 
                                    index === 1 ? 'التاني' :
                                    index === 2 ? 'التالت' :
                                    index === 3 ? 'الرابع' :
                                    index === 4 ? 'الخامس' :
                                    index === 5 ? 'السادس' :
                                    index === 6 ? 'السابع' :
                                    index === 7 ? 'الثامن' : 'التاسع'}</h3>
                    <p style="color:rgba(255,255,255,0.6); margin-top:15px;">اضغطي على الكارت</p>
                </div>
                <div class="card-back">
                    <img src="${img.src}" alt="صورتنا الحلوة" onerror="this.src='https://via.placeholder.com/300x250?text=نور+وحبيبها'">
                    <div class="love-text">💖 ${img.message} 💖</div>
                </div>
            `;
            card.addEventListener('click', () => {
                card.classList.toggle('flipped');
                // Create heart effect on click
                createHearts(10);
            });
            cardsGrid.appendChild(card);
        });

        // Music
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let isPlaying = false;

        // Auto play on page load
        music.play().then(() => {
            isPlaying = true;
            musicBtn.innerHTML = '⏸️ عمرو دياب - تملي معاك ⏸️';
        }).catch(() => {
            console.log('Browser blocked auto-play, user must click');
        });

        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                music.pause();
                musicBtn.innerHTML = '🎵 عمرو دياب - تملي معاك 🎵';
            } else {
                music.play();
                musicBtn.innerHTML = '⏸️ عمرو دياب - تملي معاك ⏸️';
            }
            isPlaying = !isPlaying;
        });

        // Surprise button
        const surpriseBtn = document.getElementById('surpriseBtn');
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modalImage');
        const modalMessage = document.getElementById('modalMessage');

        const bigMessages = [
            "يا نور... أنتِ أجمل حاجة في حياتي كلها ❤️",
            "حبيبتي... أنا بحبك قد السما والنجوم 💕",
            "نور حياتي... انتي السبب اللي مخلي الدنيا حلوة 💖",
            "خطيبتي الغالية... عمري كله مش هيكفي حبك 💗",
            "يا أجمل قصة حب في التاريخ... بحبك بجد 💓"
        ];

        surpriseBtn.addEventListener('click', () => {
            const randomImage = images[Math.floor(Math.random() * images.length)];
            const randomMessage = bigMessages[Math.floor(Math.random() * bigMessages.length)];
            
            modalImage.src = randomImage.src;
            modalMessage.innerHTML = randomMessage + " 💝💝💝";
            modal.style.display = 'flex';
            
            // Create explosion of hearts
            for(let i = 0; i < 50; i++) {
                setTimeout(() => createHearts(1), i * 20);
            }
        });

        function closeModal() {
            modal.style.display = 'none';
        }

        function createHearts(count) {
            for(let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💘', '💝'][Math.floor(Math.random() * 7)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.getElementById('floatingHearts').appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
        }

        // Continuous background hearts
        setInterval(() => {
            createHearts(3);
        }, 800);
    </script>
</body>
</html>
